esphome:
  name: mini-display

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino
# + DISPLAY CONFIGURATION ---------------------- #

# SPI Bus Configuration
spi:
  clk_pin: GPIO18  # SPI CLK (use VSPI/HSPI safe pins, avoid GPIO6-11)
  mosi_pin: GPIO13  # SPI MOSI (GPIO23 is not usable on some ESP32-S3 boards)
  miso_pin: GPIO19  # SPI MISO (if needed)

# ILI9xxx Display configuration
display:
  - platform: ili9xxx
    model: ST7789V
    cs_pin: GPIO5          # Chip Select
    dc_pin: GPIO4          # Data/Command
    reset_pin: GPIO2       # Reset
    rotation: 0            # Adjust as needed
    invert_colors: false   # Set to true if colors are inverted
    show_test_card: true   # Displays a test card for debugging

# I2C Bus for Touchscreen
i2c:
  sda: GPIO21  # TP SDA (avoid GPIO6-11 which are flash pins)
  scl: GPIO17  # TP SCL (GPIO22 not usable on some ESP32-S3 boards)
  scan: true  # Optional: to detect the touchscreen on the I²C bus

# Touchscreen Configuration
touchscreen:
  - platform: cst816
    id: my_touchscreen
    interrupt_pin: GPIO34  # TP INT (input-only pin is fine for interrupt)
    reset_pin: GPIO33      # TP RST (must be output-capable; avoid input-only pins)
    address: 0x15  # Replace with the detected address from `i2c.scan`
    skip_probe: true  # This might help if the chip only responds after a touch event

    on_press:
      then:
        - homeassistant.service:
            service: script.turn_on
            data:
              entity_id: script.script.all_lights_off

# Define a PWM output on the ESP32
output:
  - platform: ledc
    pin: GPIO15
    id: backlight_pwm

# Define a monochromatic, dimmable light for the backlight
light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: back_light
    restore_mode: ALWAYS_ON

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# - DISPLAY CONFIGURATION ---------------------- #

